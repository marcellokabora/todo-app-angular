<!-- App Shell -->
<div class="min-h-screen bg-gray-50">
  <!-- Header with Toolbar -->
  <header class="sticky top-0 z-20 border-b border-gray-200 bg-white">
    <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-3">
      <!-- Logo & Title -->
      <a routerLink="/tasks" class="flex items-center gap-2">
        <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-indigo-600">
          <svg class="h-5 w-5 text-white" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd"
              d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z"
              clip-rule="evenodd" />
          </svg>
        </div>
        <span class="text-lg font-bold text-gray-900">{{ title() }}</span>
      </a>

      <!-- Toolbar actions -->
      <nav ngToolbar class="flex items-center gap-2" aria-label="Main actions">
        <a ngToolbarWidget value="tasks" routerLink="/tasks" routerLinkActive="text-indigo-600"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-lg px-3 py-1.5 text-sm font-medium text-gray-600 transition-colors hover:bg-gray-100 hover:text-gray-900">
          Tasks
        </a>
        <a ngToolbarWidget value="add-task" routerLink="/add-task" routerLinkActive="text-indigo-600"
          class="rounded-lg px-3 py-1.5 text-sm font-medium text-gray-600 transition-colors hover:bg-gray-100 hover:text-gray-900">
          Add Task
        </a>
        <a ngToolbarWidget value="statistics" routerLink="/statistics" routerLinkActive="text-indigo-600"
          class="rounded-lg px-3 py-1.5 text-sm font-medium text-gray-600 transition-colors hover:bg-gray-100 hover:text-gray-900">
          Statistics
        </a>

        <!-- Task count badge -->
        <span class="rounded-full bg-indigo-100 px-2.5 py-0.5 text-xs font-medium text-indigo-700">
          {{ taskService.taskStats().pending }} pending
        </span>
      </nav>
    </div>
  </header>

  <!-- Main content -->
  <main>
    <router-outlet />
  </main>
</div>
