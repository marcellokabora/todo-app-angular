<!-- App Shell -->
<div class="min-h-screen bg-surface-alt">
  <!-- Header with Toolbar -->
  <header class="sticky top-0 z-20 border-b border-border bg-surface">
    <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-3">
      <!-- Logo & Title -->
      <a routerLink="/tasks" class="flex items-center gap-2">
        <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-accent">
          <svg class="h-5 w-5 text-white" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd"
              d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z"
              clip-rule="evenodd" />
          </svg>
        </div>
        <span class="text-lg font-bold text-heading">{{ title() }}</span>
      </a>

      <!-- Toolbar actions -->
      <nav ngToolbar class="flex items-center gap-2" aria-label="Main actions">
        <a ngToolbarWidget value="tasks" routerLink="/tasks" routerLinkActive="text-accent-text"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-lg px-3 py-1.5 text-sm font-medium text-body transition-colors hover:bg-surface-hover hover:text-heading">
          Tasks
        </a>
        <a ngToolbarWidget value="add-task" routerLink="/add-task" routerLinkActive="text-accent-text"
          class="rounded-lg px-3 py-1.5 text-sm font-medium text-body transition-colors hover:bg-surface-hover hover:text-heading">
          Add Task
        </a>
        <a ngToolbarWidget value="statistics" routerLink="/statistics" routerLinkActive="text-accent-text"
          class="rounded-lg px-3 py-1.5 text-sm font-medium text-body transition-colors hover:bg-surface-hover hover:text-heading">
          Statistics
        </a>

        <!-- Theme toggle -->
        <app-theme-switcher />

      </nav>
    </div>
  </header>

  <!-- Main content -->
  <main>
    <router-outlet />
  </main>
</div>
